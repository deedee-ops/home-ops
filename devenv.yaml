---
# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  nixpkgs:
    url: github:nixos/nixpkgs/nixos-unstable
  talos-pilot:
    url: github:Handfish/talos-pilot

allow_unfree: true

profile: deedee

secretspec:
  enable: true
  provider: keyring
