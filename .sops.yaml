---
# yaml-language-server: $schema=https://schemas.ajgon.casa/custom/sops.config.json
#
# To get a new key from remote SSH machine, invoke:
# nix-shell -p ssh-to-age --run 'cat /etc/ssh/ssh_host_ed25519_key.pub | ssh-to-age'

keys:
  - users:
      - &ajgon ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOrBLT88ZZ+lO8hHcj+4jqtor79OLhQZcDWF98kkWkfn

creation_rules:
  - path_regex: scripts/.*\.sops\.env$
    key_groups:
      - age:
          - *ajgon
