---
# yaml-language-server: $schema=https://schemas.ajgon.casa/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mcp-servers-kubectl
spec:
  dependsOn:
    - name: toolhive-operator
  interval: 1h
  path: "./kubernetes/apps/ai/mcp-servers/kubectl"
  patches: []
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
---
# yaml-language-server: $schema=https://schemas.ajgon.casa/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mcp-servers-talos
spec:
  dependsOn:
    - name: toolhive-operator
  interval: 1h
  path: "./kubernetes/apps/ai/mcp-servers/talos"
  patches: []
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
