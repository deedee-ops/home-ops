---
# yaml-language-server: $schema=https://schemas.ajgon.casa/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bifrost
spec:
  components:
    - ../../../components/oidc
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  patches:
    - patch: |-
        - op: add
          path: /spec/targetRefs/0/sectionName
          value: app
      target:
        group: gateway.envoyproxy.io
        kind: SecurityPolicy
  path: ./kubernetes/apps/ai/bifrost
  postBuild:
    substitute:
      APP: bifrost
      ROOT_DOMAIN: "${ROOT_DOMAIN}"
      VOLSYNC_CAPACITY: 5Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  wait: false
