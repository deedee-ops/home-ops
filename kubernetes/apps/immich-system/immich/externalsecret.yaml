---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: immich-secret
    template:
      data:
        IMMICH_ALBUM_CREATOR_API_KEY: "{{ .IMMICH_ALBUM_CREATOR_API_KEY }}"
  dataFrom:
    - extract:
        key: kubernetes/immich-system/immich
