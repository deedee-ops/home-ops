---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: retrom
spec:
  chartRef:
    kind: OCIRepository
    name: retrom
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/jmberesford/retrom-service
              tag: 0.8.0@sha256:42c37204270aeead444ae3643f39b412bd156b43710f50a3dca37d2b952bbadf
            env:
              TZ: Europe/Warsaw
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /web
                    port: &port 5101
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 4Gi
        initContainers:
          01-logs:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            command:
              - "/bin/sh"
              - "-c"
              - "touch /app/retrom.log && chmod 644 /app/retrom.log"
            securityContext: *sc
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: 80
            targetPort: *port
    route:
      app:
        hostnames:
          - "retrom.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: retrom
                port: 80
            filters:
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  set:
                    - name: Content-Security-Policy
                      value: >-
                        default-src 'self' data: blob: wss:;
                        frame-src 'self' https://www.youtube.com;
                        img-src 'self' data: https://images.igdb.com;
                        object-src 'none';
                        style-src 'self' 'unsafe-inline' data: blob: *.${ROOT_DOMAIN};
                        script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
    persistence:
      config:
        type: secret
        name: retrom-secret
        advancedMounts:
          main:
            app:
              - path: /app/config
      data:
        existingClaim: "retrom"
        advancedMounts:
          main:
            app:
              - path: /app/data
      roms:
        type: custom
        volumeSpec:
          csi:
            driver: nfs.csi.k8s.io
            volumeAttributes:
              server: nas.internal
              share: "/mnt/tank/retro/retrom"
              mountOptions: "noac,nfsvers=4.1,nconnect=16,hard,noatime"
        advancedMounts:
          main:
            app:
              - path: /roms
      logs:
        type: emptyDir
        advancedMounts:
          main:
            app:
              - path: /app/retrom.log
                subPath: retrom.log
            01-logs:
              - path: /app
      tmp:
        type: emptyDir
        advancedMounts:
          main:
            app:
              - path: /app/web/node_modules/.vite-temp
                subPath: vite-temp
              - path: /home/retrom
                subPath: home-retrom
              - path: /tmp
                subPath: tmp
