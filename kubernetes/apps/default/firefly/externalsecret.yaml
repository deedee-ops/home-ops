---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: firefly
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: firefly-secret
    template:
      data:
        APP_KEY: "{{ .APP_KEY }}"
        firefly-cron.sh: |
          wget -O /dev/null "http://firefly:8080/api/v1/cron/{{ .API_TOKEN }}"
  dataFrom:
    - extract:
        key: kubernetes/default/firefly
