---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
spec:
  chartRef:
    kind: OCIRepository
    name: paperless-ngx
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          glance/name: Paperless-NGX
          glance/icon: di:paperless-ngx
          glance/url: https://paperless.${ROOT_DOMAIN}
        containers:
          app:
            image: &img
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
            env:
              PAPERLESS_ACCOUNT_EMAIL_VERIFICATION: "true"
              PAPERLESS_APPS: "allauth.socialaccount.providers.openid_connect"
              PAPERLESS_CONSUMER_POLLING: "60" # ionotify doesn't work over NFS
              PAPERLESS_CONSUMER_POLLING_DELAY: "5"
              PAPERLESS_CONSUMER_POLLING_RETRY_COUNT: "30"
              PAPERLESS_CONSUMER_RECURSIVE: "true"
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
              PAPERLESS_CONSUMPTION_DIR: "/sync/consume"
              PAPERLESS_DB_TIMEOUT: 60
              PAPERLESS_DATA_DIR: &data "/config"
              PAPERLESS_DATE_ORDER: "YMD"
              PAPERLESS_DATE_PARSER_LANGUAGES: "pl+en"
              PAPERLESS_DISABLE_REGULAR_LOGIN: "false"
              PAPERLESS_EXPORT_DIR: &export "/data/export"
              PAPERLESS_MEDIA_ROOT: &media "/data/media"
              PAPERLESS_OCR_LANGUAGE: "eng+pol"
              PAPERLESS_OCR_USER_ARGS: "{\"invalidate_digital_signatures\": true}"
              PAPERLESS_PORT: &port 80
              PAPERLESS_REDIRECT_LOGIN_TO_SSO: "true"
              PAPERLESS_REDIS: "redis://paperless-ngx-dragonfly:6379"
              PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: "true"
              PAPERLESS_SOCIAL_ACCOUNT_SYNC_GROUPS: "true"
              PAPERLESS_SOCIAL_AUTO_SIGNUP: "true"
              PAPERLESS_SUPERVISORD_WORKING_DIR: "/tmp"
              PAPERLESS_TASK_WORKERS: "1"
              PAPERLESS_TIKA_ENABLED: "1"
              PAPERLESS_TIKA_ENDPOINT: "http://localhost:9998"
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: "http://localhost:3000"
              PAPERLESS_TIME_ZONE: &tz Europe/Warsaw
              PAPERLESS_TRASH_DIR: &trash "/data/trash"
              PAPERLESS_TRUSTED_PROXIES: "172.30.0.0/16"
              PAPERLESS_URL: "https://paperless.${ROOT_DOMAIN}"
              PAPERLESS_WEBSERVER_WORKERS: "1"
              REQUESTS_CA_BUNDLE: /etc/ssl/certs/homelab.crt
              USERMAP_UID: 1000
              USERMAP_GID: 1000
              TZ: *tz
              PAPERLESS_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: &secret paperless-ngx-secret
                    key: PAPERLESS_SECRET_KEY
            envFrom:
              - secretRef:
                  name: "paperless-ngx-oidc-secret"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup: # in case of large DB migrations
                enabled: true
                spec:
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 8192Mi
          tika:
            image:
              repository: docker.io/apache/tika
              tag: 3.3.1.0@sha256:90b7fa1dc018434075fce9e1d9b88b1e3d0ea6979d0cf86e116c79a8073ae973
            securityContext: *sc
            resources:
              requests:
                cpu: "10m"
                memory: "256Mi"
              limits:
                cpu: "1000m"
                memory: "1Gi"
            probes:
              liveness: &tikaProbes
                enabled: true
                spec:
                  tcpSocket:
                    port: 9998
              readiness: *tikaProbes
          gotenberg:
            image:
              repository: "docker.io/gotenberg/gotenberg"
              tag: "8.34.0@sha256:67097317623a503ba2a6a7e9ae8db6929a1f7e1bbd88077bacf2d325fbdab923"
            command:
              - "gotenberg"
              - "--chromium-disable-javascript=true"
              - "--chromium-allow-list=file:///tmp/.*"
            securityContext: *sc
            resources:
              requests:
                cpu: "10m"
                memory: "192Mi"
              limits:
                cpu: "500m"
                memory: "256Mi"
            probes:
              liveness: &gotenProbes
                enabled: true
                spec:
                  tcpSocket:
                    port: 3000
              readiness: *gotenProbes
          gpt:
            image:
              repository: ghcr.io/icereed/paperless-gpt
              tag: v0.27.0@sha256:855d9df5bacb2bed60bd520f1ffe0d118695aef9f77d37466ae85823001f547d
            command:
              - /app/paperless-gpt
            env:
              AUTO_GENERATE_CORRESPONDENTS: "false"
              AUTO_GENERATE_CREATED_DATE: "false"
              AUTO_GENERATE_DOCUMENT_TYPE: "false"
              AUTO_GENERATE_TAGS: "false"
              AUTO_GENERATE_TITLE: "false"
              HOME: /home/paperless-gpt
              LLM_LANGUAGE: "English,Polish"
              LLM_MODEL: vllm/Google/gemma-4-31B-it
              LLM_PROVIDER: openai
              OCR_PROCESS_MODE: image
              OCR_PROVIDER: llm
              OPENAI_API_KEY: dummy
              OPENAI_BASE_URL: http://bifrost.ai.svc.cluster.local/v1
              PAPERLESS_BASE_URL: http://localhost
              PAPERLESS_PUBLIC_URL: "https://paperless.${ROOT_DOMAIN}"
              PUID: 1000
              PGID: 1000
              VISION_LLM_MODEL: vllm/Qwen/Qwen3-VL-30B-A3B-Thinking
              VISION_LLM_PROVIDER: openai
              TZ: *tz
              PAPERLESS_API_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: PAPERLESS_API_TOKEN
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: &gptPort 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext: *sc
            resources:
              requests:
                cpu: "10m"
                memory: "32Mi"
              limits:
                memory: "1Gi"
        initContainers:
          01-download-languages:
            image: *img
            command:
              - "/bin/sh"
              - "-c"
              - |
                cp -r /usr/share/tesseract-ocr/5/tessdata/* /tessdata/
                curl -o /tessdata/pol.traineddata \
                https://raw.githubusercontent.com/tesseract-ocr/tessdata/refs/heads/main/pol.traineddata
            securityContext: *sc
            resources:
              requests:
                cpu: 5m
                memory: 10M
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      labels:
        egress.cilium.io/ai: "true"
        egress.cilium.io/auth: "true"
        egress.cilium.io/smtp-relay: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: *port
      gpt:
        ports:
          http:
            port: 80
            targetPort: *gptPort
    route:
      app:
        hostnames:
          - "paperless.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: paperless-ngx-app
                port: 80
            filters: &hrFilters
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  set:
                    - name: Content-Security-Policy
                      value: >-
                        default-src 'self';
                        img-src 'self' data:;
                        object-src 'self';
                        script-src 'self' 'unsafe-inline';
                        style-src 'self' 'unsafe-inline';
      gpt:
        hostnames:
          - "paperless-gpt.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: paperless-ngx-gpt
                port: 80
            filters: *hrFilters
    persistence:
      data:
        existingClaim: paperless-ngx
        advancedMounts:
          main:
            app:
              - subPath: "data"
                path: *data
              - subPath: "export"
                path: *export
              - subPath: "media"
                path: *media
              - subPath: "trash"
                path: *trash
            gpt:
              - subPath: "gpt-config"
                path: /app/config
              - subPath: "gpt-prompts"
                path: /app/prompts
      homelab-root-ca:
        type: secret
        name: homelab-root-ca
        advancedMounts:
          main:
            app:
              - path: /etc/ssl/certs/homelab.crt
                subPath: ec.crt
      sync:
        type: custom
        volumeSpec:
          csi:
            driver: nfs.csi.k8s.io
            volumeAttributes:
              server: nas.internal
              share: "/mnt/fast/media"
              mountOptions: "noac,nfsvers=4.1,nconnect=16,hard,noatime"
        advancedMounts:
          main:
            app:
              - path: "/sync"
                subPath: sync/paperless-ngx
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi
        advancedMounts:
          main:
            app:
              - subPath: run
                path: /run
              - subPath: apt
                path: /var/lib/apt
              - subPath: tessdata
                path: /usr/share/tesseract-ocr/5/tessdata
              - subPath: tmp-app
                path: /tmp
            gpt:
              - subPath: gpt-app-db
                path: /app/db
              - subPath: gpt-home
                path: /home/paperless-gpt
              - subPath: tmp-gpt
                path: /tmp
            gotenberg:
              - subPath: tmp-gotenberg
                path: /tmp
            tika:
              - subPath: tmp-tika
                path: /tmp
            01-download-languages:
              - subPath: tessdata
                path: /tessdata
