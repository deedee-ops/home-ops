---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: discord-bots
spec:
  chartRef:
    kind: OCIRepository
    name: discord-bots
  interval: 1h
  values:
    controllers:
      fix-tweet-bot:
        containers:
          app:
            image:
              repository: ghcr.io/kyrela/fixtweetbot
              tag: 3.3.8@sha256:a8ddda2f0731e92cfd61a5e36e720a9eabc615c52686a99fabd84d3839767a17
            env:
              DATABASE_HOST: localhost
              DATABASE_PORT: 3306
              TZ: Europe/Warsaw
            envFrom:
              - secretRef:
                  name: fix-tweet-bot-secret
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: "50m"
              limits:
                cpu: "1000m"
                memory: "512Mi"
          db:
            image:
              repository: docker.io/library/mariadb
              tag: 12.2@sha256:b3af559fc38e013c50dd5b5993bfbbb21125c1a62d976b3b0a14d9c4acaae578
            env:
              TZ: Europe/Warsaw
              MYSQL_DATABASE:
                secretKeyRef:
                  name: fix-tweet-bot-secret
                  key: DATABASE_NAME
              MYSQL_PASSWORD:
                secretKeyRef:
                  name: fix-tweet-bot-secret
                  key: DATABASE_PASSWORD
              MYSQL_ROOT_PASSWORD:
                secretKeyRef:
                  name: fix-tweet-bot-secret
                  key: DATABASE_ROOT_PASSWORD
              MYSQL_USER:
                secretKeyRef:
                  name: fix-tweet-bot-secret
                  key: DATABASE_USER
            securityContext: *sc
            resources:
              requests:
                cpu: "50m"
              limits:
                cpu: "1000m"
                memory: "1024Mi"
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    persistence:
      db-data:
        existingClaim: discord-bots
        advancedMounts:
          fix-tweet-bot:
            db:
              - path: /var/lib/mysql
                subPath: fix-tweet-bot-db
