---
# yaml-language-server: $schema=https://schemas.ajgon.casa/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: discord-bots-egress-external
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: discord-bots
  egress:
    - toFQDNs:
        - matchName: discord.com
        - matchName: gateway.discord.gg
      toPorts:
        - ports:
            - port: "443"
