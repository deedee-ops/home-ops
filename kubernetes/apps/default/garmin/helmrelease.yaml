---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garmin
spec:
  chartRef:
    kind: OCIRepository
    name: garmin
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: registry.${ROOT_DOMAIN}/tools/garmin-importer
              tag: latest@sha256:e232bdf8c29e2c2f700600d0a4b96be37ce22cabb95bbd43b2bad6d2fb902e00
              pullPolicy: IfNotPresent
            env:
              IMPORT_MODE: watch
              INFLUXDB_HOST: 127.0.0.1
              INFLUXDB_DATABASE: &dbName GarminStats
              TZ: Europe/Warsaw
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: "50m"
              limits:
                cpu: "1000m"
                memory: "512Mi"
          influxdb:
            image:
              repository: public.ecr.aws/docker/library/influxdb
              tag: 1.12.4@sha256:edbe4351f42238b267a7231c258050b37b462e55930236c1144301a47740582b
            env:
              INFLUXDB_DATA_INDEX_VERSION: tsi1
              INFLUXDB_DB: *dbName
              TZ: Europe/Warsaw
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: "50m"
              limits:
                cpu: "1000m"
                memory: "1024Mi"
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      influxdb:
        ports:
          influxdb:
            port: 8086
    persistence:
      config:
        existingClaim: garmin
        advancedMounts:
          main:
            app:
              - subPath: config
                path: /config
      data:
        type: custom
        volumeSpec:
          csi:
            driver: nfs.csi.k8s.io
            volumeAttributes:
              server: nas.internal
              share: "/mnt/fast/media"
              mountOptions: "noac,nfsvers=4.1,nconnect=16,hard,noatime"
        advancedMounts:
          main:
            app:
              - path: "/data"
                subPath: sync/garmin
                readOnly: true
      influxdb:
        existingClaim: garmin
        advancedMounts:
          main:
            influxdb:
              - subPath: influxdb
                path: /var/lib/influxdb
