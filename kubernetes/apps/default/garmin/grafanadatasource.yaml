---
# yaml-language-server: $schema=https://schemas.ajgon.casa/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: garmin
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: influxdb
    name: Garmin-InfluxDB
    uid: garmin_influxdb
    access: proxy
    url: http://garmin.default.svc.cluster.local:8086
    database: GarminStats
    isDefault: false
    editable: true
    jsonData:
      httpMode: GET
