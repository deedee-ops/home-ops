- name: Gitops
  slug: gitops
  define:
    - &feed
      cache: 1h
      style: vertical-list
      limit: 20
      collapse-after: -1
  columns:
    - size: full
      widgets:
        - type: split-column
          max-columns: 4
          widgets:
            - type: rss
              title: onedr0p
              title-url: https://github.com/onedr0p/home-ops/commits?author=onedr0p
              <<: *feed
              feeds:
                - url: https://github.com/onedr0p/home-ops/commits.atom?author=onedr0p
                  title: onedr0p
            - type: rss
              title: buroa
              title-url: https://github.com/buroa/k8s-gitops/commits?author=buroa
              <<: *feed
              feeds:
                - url: https://github.com/buroa/k8s-gitops/commits.atom?author=buroa
                  title: buroa
            - type: rss
              title: joryirving
              title-url: https://github.com/joryirving/home-ops/commits?author=joryirving
              <<: *feed
              feeds:
                - url: https://github.com/joryirving/home-ops/commits.atom?author=joryirving
                  title: joryirving
            - type: rss
              title: kashalls
              title-url: https://github.com/waifulabs/infrastructure/commits?author=kashalls
              <<: *feed
              feeds:
                - url: https://github.com/waifulabs/infrastructure/commits.atom?author=kashalls
                  title: kashalls
