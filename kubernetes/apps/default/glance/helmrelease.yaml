---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app glance
spec:
  chartRef:
    kind: OCIRepository
    name: glance
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: glanceapp/glance
              tag: v0.8.4@sha256:6df86a7e8868d1eda21f35205134b1962c422957e42a0c44d4717c8e8f741b1a
            env:
              GLANCE_PORT: &port 80
              TZ: Europe/Warsaw
            envFrom:
              - secretRef:
                  name: "glance-secret"
            probes:
              liveness: &liveness
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
          k8s-extension:
            image:
              repository: ghcr.io/lukasdietrich/glance-k8s/glance-k8s
              tag: v0.4.7@sha256:4ff785aa8d33d9bd065f1f66cb1c9d4eedd7c0793af07f2bebfb22889f0b07ee
            env:
              TZ: Europe/Warsaw
            securityContext: *sc
            probes:
              liveness: *liveness
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
    defaultPodOptions:
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      labels:
        egress.cilium.io/kube-apiserver: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    serviceAccount:
      glance:
        enabled: true
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "www.${ROOT_DOMAIN}"
          - "glance.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: 80
            filters:
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  set:
                    - name: Content-Security-Policy
                      value: >-
                        default-src 'self';
                        object-src 'none';
                        img-src 'self' https:;
                        script-src 'self' 'unsafe-inline';
                        style-src 'self' 'unsafe-inline';
    rbac:
      roles:
        list:
          type: ClusterRole
          forceRename: *app
          rules:
            - apiGroups:
                - ""
                - "metrics.k8s.io"
              resources:
                - "nodes"
              verbs:
                - "list"
            - apiGroups:
                - ""
              resources:
                - "services"
              verbs:
                - "list"
            - apiGroups:
                - "apps"
              resources:
                - "deployments"
                - "statefulsets"
                - "daemonsets"
              verbs:
                - "list"
      bindings:
        list:
          type: ClusterRoleBinding
          forceRename: *app
          roleRef:
            kind: ClusterRole
            name: *app
          subjects:
            - kind: ServiceAccount
              name: *app
              namespace: "{{ .Release.Namespace }}"
    persistence:
      config-files:
        type: configMap
        name: glance-configmap
        globalMounts:
          - path: /app/config
      secret-files:
        type: secret
        name: glance-config-secret
        globalMounts:
          - path: /app/config/secrets
