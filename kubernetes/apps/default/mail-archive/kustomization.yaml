---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./networkpolicy.yaml
  - ./ocirepository.yaml
  - ./pocketidoidcclient.yaml
  - ./pvc.yaml
configMapGenerator:
  - name: mail-archive-configmap
    files:
      - ./resources/dovecot.conf
      - ./resources/imapsync.sh
  - name: mail-archive-configs-configmap
    files:
      - ./resources/dovecot.oauth.conf
      - ./resources/roundcube.oauth.inc.php
generatorOptions:
  disableNameSuffixHash: true
