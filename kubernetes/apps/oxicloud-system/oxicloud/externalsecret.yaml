---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oxicloud
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: oxicloud-secret
    template:
      data:
        OXICLOUD_JWT_SECRET: "{{ .OXICLOUD_JWT_SECRET }}"
        OXICLOUD_OIDC_CLIENT_ID: "{{ .OXICLOUD_OIDC_CLIENT_ID }}"
        OXICLOUD_OIDC_CLIENT_SECRET: "{{ .OXICLOUD_OIDC_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: kubernetes
