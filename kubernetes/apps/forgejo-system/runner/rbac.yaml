---
# yaml-language-server: $schema=https://schemas.ajgon.casa/serviceaccount-v1.json
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-runner
---
# yaml-language-server: $schema=https://schemas.ajgon.casa/clusterrolebinding-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forgejo-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: forgejo-runners
subjects:
  - kind: ServiceAccount
    name: forgejo-runner
    namespace: forgejo-system
---
# yaml-language-server: $schema=https://schemas.ajgon.casa/clusterrole-rbac-v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forgejo-runners
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
