---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: forgejo-secret
    template:
      data:
        oauth2: |
          JWT_SECRET={{ .FORGEJO_OAUTH2_JWT_SECRET }}
        security: |
          INTERNAL_TOKEN={{ .FORGEJO_SECURITY_INTERNAL_TOKEN }}
          SECRET_KEY={{ .FORGEJO_SECURITY_SECRET_KEY }}
  dataFrom:
    - extract:
        key: kubernetes
---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-signing-key
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: forgejo-signing-key-secret
    template:
      data:
        ed25519: "{{ .FORGEJO_SIGNING_PRIVATE_KEY }}"
        ed25519.pub: "{{ .FORGEJO_SIGNING_PUBLIC_KEY }}"
  dataFrom:
    - extract:
        key: kubernetes
---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-oidc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: forgejo-oidc-secret
    template:
      data:
        key: "{{ .FORGEJO_CLIENT_ID }}"
        secret: "{{ .FORGEJO_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: kubernetes
