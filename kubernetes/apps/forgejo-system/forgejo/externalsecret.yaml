---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: forgejo-secret
    template:
      data:
        oauth2: |
          JWT_SECRET={{ .OAUTH2_JWT_SECRET }}
        security: |
          INTERNAL_TOKEN={{ .SECURITY_INTERNAL_TOKEN }}
          SECRET_KEY={{ .SECURITY_SECRET_KEY }}
  dataFrom:
    - extract:
        key: kubernetes/forgejo-system/forgejo
---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-signing-key
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: forgejo-signing-key-secret
    template:
      data:
        ed25519: "{{ .SIGNING_PRIVATE_KEY }}"
        ed25519.pub: "{{ .SIGNING_PUBLIC_KEY }}"
  dataFrom:
    - extract:
        key: kubernetes/forgejo-system/forgejo
