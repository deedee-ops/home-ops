---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whisper
spec:
  chartRef:
    kind: OCIRepository
    name: whisper
  interval: 1h
  values:
    controllers:
      main:
        type: statefulset
        containers:
          app:
            image:
              repository: hwdsl2/whisper-server
              tag: latest@sha256:120e4b7835898715d97b16e54e991e5226535fdfad506863a3b9cd4dd6d6377f
            env:
              WHISPER_COMPUTE_TYPE: int8
              WHISPER_DEVICE: cpu
              WHISPER_MODEL: large-v3-turbo
              WHISPER_THREADS: 12
              TZ: Europe/Warsaw
            probes:
              # big audio files kill healthchecks, so readiness/liveness is pointless
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 9000
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 2Gi
              limits:
                memory: 12Gi
        statefulset:
          volumeClaimTemplates:
            - name: data
              storageClass: ceph-block
              accessMode: ReadWriteOnce
              size: 5Gi
              advancedMounts:
                app:
                  - path: /var/lib/whisper
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: 80
            targetPort: *port
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /run
            subPath: run
