---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: open-webui
spec:
  launchUrl: https://ai.${ROOT_DOMAIN}
  callbackUrls:
    - "https://ai.${ROOT_DOMAIN}/oauth/oidc/callback"
  secret:
    keys:
      clientID: OAUTH_CLIENT_ID
      clientSecret: OAUTH_CLIENT_SECRET
