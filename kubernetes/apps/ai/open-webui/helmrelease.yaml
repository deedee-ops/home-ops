---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: open-webui
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: main@sha256:74093dadc9c6aabc23987a74fd8c2fb8d995b1a5b22e83b0036fb9d6af590e8c
            env:
              ENABLE_FOLLOW_UP_GENERATION: "False"
              ENABLE_LOGIN_FORM: "False"
              ENABLE_OAUTH_SIGNUP: "True"
              ENABLE_OLLAMA_API: "False"
              ENABLE_OPENAI_API: "True"
              ENABLE_PERSISTENT_CONFIG: "False"
              ENABLE_SIGNUP: "False"
              ENABLE_VERSION_UPDATE_CHECK: "False"
              OAUTH_EMAIL_CLAIM: "email"
              OAUTH_GROUP_CLAIM: "groups"
              OAUTH_PROVIDER_NAME: "Pocket ID"
              OAUTH_SCOPES: "openid email profile groups"
              OAUTH_USERNAME_CLAIM: "preferred_username"
              OPENID_PROVIDER_URL: "https://id.${ROOT_DOMAIN}/.well-known/openid-configuration"
              REQUESTS_CA_BUNDLE: "/certs/homelab.pem"
              SSL_CERT_FILE: "/certs/homelab.pem"
              WEBUI_URL: "https://ai.${ROOT_DOMAIN}"
              TZ: Europe/Warsaw
            envFrom:
              - secretRef:
                  name: "open-webui-secret"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
                  - KILL
                  - SETGID
                  - SETUID
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 4096Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      labels:
        egress.cilium.io/auth: "true"
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/wss
            port: 80
            targetPort: *port
    route:
      app:
        hostnames:
          - "ai.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: open-webui
                port: 80
            filters:
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  set:
                    - name: Content-Security-Policy
                      value: >-
                        default-src 'self' data: blob:;
                        object-src 'self';
                        script-src 'self' 'unsafe-inline' 'unsafe-eval';
                        style-src 'self' 'unsafe-inline';
    persistence:
      config:
        existingClaim: "open-webui"
        globalMounts:
          - path: /app/backend/data
      homelab-ca:
        type: secret
        name: homelab-root-ca.crt
        globalMounts:
          - path: /certs/homelab.pem
            subPath: ec.crt
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
