---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bifrost
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: bifrost-secret
    template:
      data:
        BIFROST_ENCRYPTION_KEY: "{{ .BIFROST_ENCRYPTION_KEY }}"
        VLLM_HERMES_API_KEY: "{{ .HERMES_API_SERVER_KEY }}"
        VLLM_GPT_OSS_URL: "{{ .BIFROST_VLLM_GPT_OSS_URL }}"
        VLLM_QWEN3_URL: "{{ .BIFROST_VLLM_QWEN3_URL }}"
  dataFrom:
    - extract:
        key: kubernetes
