---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openedai-speech
spec:
  chartRef:
    kind: OCIRepository
    name: openedai-speech
  interval: 1h
  values:
    controllers:
      main:
        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/matatonic/openedai-speech-min
              tag: latest@sha256:e82d719252fb1b861967f4f9abb8513f028ab9c1139451245688dbf34992b060
            env:
              HF_HOME: &voicesPath /app/voices
              PRELOAD_MODEL: piper
              TTS_HOME: *voicesPath
              TZ: Europe/Warsaw
            probes:
              liveness:
                enabled: true
                spec:
                  tcpSocket:
                    port: &appPort 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *appPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  tcpSocket:
                    port: *appPort
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
          lang-proxy:
            image: &lpImage
              repository: python
              tag: 3.14-slim@sha256:3fa9f1158b0d8b5029c357770bd522e7955546ffc5db885d8b366ec4a687afd4
            command:
              - python3
              - /scripts/lang-proxy.py
            env:
              PYTHONPATH: /deps
              VOICE_BACKEND_URL: http://localhost:8000
              VOICE_EN: alloy
              VOICE_PL: nova
              TZ: Europe/Warsaw
            probes:
              liveness:
                enabled: true
                spec:
                  tcpSocket:
                    port: &lpPort 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *lpPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  tcpSocket:
                    port: *lpPort
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
        initContainers:
          01-download-polish-voices:
            image:
              repository: alpine/curl
              tag: 8.19.0@sha256:c103daf2dbf75dbaee86c278f45be6c82acd86eef27e17521d0992bf90031d81
            env:
              TTS_HOME: *voicesPath
            command:
              - sh
              - -c
              - |
                set -e
                BASE="https://huggingface.co/rhasspy/piper-voices/resolve/main/pl/pl_PL/gosia/medium"
                if [ ! -f $TTS_HOME/pl_PL-gosia-medium.onnx ]; then
                  curl -fsSL -o $TTS_HOME/pl_PL-gosia-medium.onnx      "$BASE/pl_PL-gosia-medium.onnx"
                  curl -fsSL -o $TTS_HOME/pl_PL-gosia-medium.onnx.json "$BASE/pl_PL-gosia-medium.onnx.json"
                fi
          02-install-proxy-deps:
            image: *lpImage
            command:
              - sh
              - -c
              - |
                pip install langdetect --target /deps
        statefulset:
          volumeClaimTemplates:
            - name: data
              storageClass: ceph-block
              accessMode: ReadWriteOnce
              size: 5Gi
              advancedMounts:
                app: &mountVoices
                  - path: /app/voices
                    subPath: voices
                lang-proxy: &mountDeps
                  - path: /deps
                    subPath: deps
                01-download-polish-voices: *mountVoices
                02-install-proxy-deps: *mountDeps
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: 80
            targetPort: *lpPort
    configMaps:
      app:
        enabled: true
        data:
          # yamllint disable rule:line-length
          voice_to_speaker.yaml: |
            tts-1:
              alloy:
                model: voices/en_US-libritts_r-medium.onnx
                speaker: 79
              nova:
                model: voices/pl_PL-gosia-medium.onnx
                speaker:
            tts-1-hd:
              alloy:
                model: voices/en_US-libritts_r-medium.onnx
                speaker: 79
              nova:
                model: voices/pl_PL-gosia-medium.onnx
                speaker:
    persistence:
      config:
        type: configMap
        identifier: app
        advancedMounts:
          main:
            app:
              - path: /app/config/voice_to_speaker.yaml
                subPath: voice_to_speaker.yaml
      lang-proxy:
        type: configMap
        name: tts-lang-proxy-configmap
        advancedMounts:
          main:
            lang-proxy:
              - path: /scripts
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /run
            subPath: run
