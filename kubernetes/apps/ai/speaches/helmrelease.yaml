---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speaches
spec:
  chartRef:
    kind: OCIRepository
    name: speaches
  interval: 1h
  values:
    controllers:
      main:
        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/speaches-ai/speaches
              tag: 0.8.3-cpu@sha256:21e3df06d842fb7802ab470dd77c25f0e8c0d22950e8d8c6ae886e851af53ef8
            env:
              HF_HOME: /var/lib/speaches
              TZ: Europe/Warsaw
            probes:
              liveness:
                enabled: true
                spec:
                  tcpSocket:
                    port: &appPort 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *appPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  tcpSocket:
                    port: *appPort
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4096Mi
          lang-proxy:
            image: &lpImage
              repository: python
              tag: 3.14-slim@sha256:c845af9399020c7e562969a13689e929074a10fd057acd1b1fad06a2fb068e97
            command:
              - python3
              - /scripts/lang-proxy.py
            env:
              PYTHONPATH: /deps
              SPEACHES_URL: http://localhost:8000
              VOICE_EN: en_US-lessac-medium
              VOICE_PL: pl_PL-gosia-medium
              TZ: Europe/Warsaw
            probes:
              liveness:
                enabled: true
                spec:
                  tcpSocket:
                    port: &lpPort 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *lpPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  tcpSocket:
                    port: *lpPort
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
        initContainers:
          01-install-proxy-deps:
            image: *lpImage
            command:
              - sh
              - -c
              - |
                mkdir -p /var/lib/speaches/hub
                pip install langdetect --target /deps
        statefulset:
          volumeClaimTemplates:
            - name: data
              storageClass: ceph-block
              accessMode: ReadWriteOnce
              size: 1Gi
              advancedMounts:
                01-install-proxy-deps:
                  - path: /var/lib/speaches
                app:
                  - path: /var/lib/speaches
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: 80
            targetPort: *lpPort
    persistence:
      lang-proxy:
        type: configMap
        name: tts-lang-proxy-configmap
        advancedMounts:
          main:
            lang-proxy:
              - path: /scripts
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          main:
            01-install-proxy-deps:
              - path: /deps
                subPath: deps
              - path: /.cache/pip
                subPath: pip-cache
            lang-proxy:
              - path: /deps
                subPath: deps
        globalMounts:
          - path: /tmp
            subPath: tmp
