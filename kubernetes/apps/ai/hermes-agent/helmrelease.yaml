---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-agent
spec:
  chartRef:
    kind: OCIRepository
    name: hermes-agent
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          glance/name: Hermes Agent
          glance/icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/hermes-agent.png
          glance/url: https://hermes.${ROOT_DOMAIN}
        containers:
          app:
            image: &img
              repository: nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4
            args:
              - gateway
              - run
            env:
              API_SERVER_ENABLED: true
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_CORS_ORIGINS: "*"
              HERMES_DASHBOARD_OIDC_ISSUER: "https://id.${ROOT_DOMAIN}"
              HERMES_DASHBOARD_OIDC_SCOPES: "openid profile email groups"
              HERMES_DASHBOARD: true
              HERMES_DASHBOARD_HOST: "0.0.0.0"
              HERMES_DASHBOARD_PORT: &dashboardPort 9119
              HERMES_DASHBOARD_PUBLIC_URL: "https://hermes.${ROOT_DOMAIN}"
              HERMES_DASHBOARD_TUI: "1"
              PYTHONPATH: /opt/data/.local/lib/python3.13/site-packages
              SSL_CERT_FILE: "/certs/ca-bundle.pem"
              TZ: Europe/Warsaw
            envFrom:
              - secretRef:
                  name: "hermes-agent-secret"
              - secretRef:
                  name: "hermes-agent-oidc-credentials"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8642
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
                  - KILL
                  - SETGID
                  - SETUID
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 4Gi
        initContainers:
          01-merge-certificates:
            image: *img
            command:
              - sh
              - -c
              - >-
                cat /etc/ssl/certs/ca-certificates.crt /certs/homelab.pem
                > /certs/ca-bundle.pem
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      labels:
        egress.cilium.io/auth: "true"
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          api:
            port: *port
          http:
            appProtocol: kubernetes.io/wss
            port: 80
            targetPort: *dashboardPort
    route:
      app:
        hostnames:
          - "hermes.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: hermes-agent
                port: 80
            filters:
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  set:
                    - name: Content-Security-Policy
                      value: >-
                        default-src 'self';
                        img-src 'self' data:;
                        object-src 'self';
                        script-src 'self' 'unsafe-inline' 'unsafe-eval';
                        style-src 'self' 'unsafe-inline';
    persistence:
      config:
        existingClaim: "hermes-agent"
        globalMounts:
          - path: /opt/data
      root-ca:
        type: secret
        name: homelab-root-ca.crt
        globalMounts:
          - path: /certs/homelab.pem
            subPath: ec.crt
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /certs
            subPath: certs
