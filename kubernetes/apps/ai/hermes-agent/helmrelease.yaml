---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-agent
spec:
  chartRef:
    kind: OCIRepository
    name: hermes-agent
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          glance/name: Hermes Agent
          glance/icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/hermes-agent.png
          glance/url: https://hermes.${ROOT_DOMAIN}
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
            args:
              - gateway
              - run
            env:
              API_SERVER_ENABLED: true
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_CORS_ORIGINS: "*"
              HERMES_DASHBOARD: true
              HERMES_DASHBOARD_HOST: "0.0.0.0"
              HERMES_DASHBOARD_PORT: &dashboardPort 9119
              HERMES_DASHBOARD_TUI: "1"
              PYTHONPATH: /opt/data/.local/lib/python3.13/site-packages
              TZ: Europe/Warsaw
            envFrom:
              - secretRef:
                  name: "hermes-agent-secret"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8642
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
                  - KILL
                  - SETGID
                  - SETUID
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 4Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          api:
            port: *port
          http:
            appProtocol: kubernetes.io/wss
            port: 80
            targetPort: *dashboardPort
    route:
      app:
        hostnames:
          - "hermes.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: hermes-agent
                port: 80
            filters:
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  set:
                    - name: Content-Security-Policy
                      value: >-
                        default-src 'self';
                        img-src 'self' data:;
                        object-src 'self';
                        script-src 'self' 'unsafe-inline' 'unsafe-eval';
                        style-src 'self' 'unsafe-inline';
    persistence:
      config:
        existingClaim: "hermes-agent"
        globalMounts:
          - path: /opt/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
