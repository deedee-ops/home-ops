---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: arcane
spec:
  launchUrl: https://arcane.${ROOT_DOMAIN}
  callbackUrls:
    - "https://arcane.${ROOT_DOMAIN}/auth/oidc/callback"
  allowedUserGroups:
    - name: admins
      namespace: security
---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: openbao
spec:
  launchUrl: https://bao.${ROOT_DOMAIN}
  callbackUrls:
    - "https://bao.${ROOT_DOMAIN}/ui/vault/auth/oidc/oidc/callback"
    - "https://bao.${ROOT_DOMAIN}/oidc/oidc/callback"
    - "http://localhost:8250/oidc/callback"
  allowedUserGroups:
    - name: admins
      namespace: security
---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: traefik
spec:
  launchUrl: https://traefik.${ROOT_DOMAIN}
  callbackUrls:
    - "https://traefik.${ROOT_DOMAIN}/oidc/callback"
  allowedUserGroups:
    - name: admins
      namespace: security
