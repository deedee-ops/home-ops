---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openbao-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: openbao-token-secret
    template:
      data:
        token: "{{ .VAULT_TOKEN }}"
  dataFrom:
    - extract:
        key: kubernetes/cert-manager/cert-manager
