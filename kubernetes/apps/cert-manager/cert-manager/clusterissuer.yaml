---
# yaml-language-server: $schema=https://schemas.ajgon.casa/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: openbao
spec:
  vault:
    path: pki_int/sign/${VAULT_SIGNING_ROLE}
    server: https://${VAULT_HOST}
    caBundle: ${CA_BUNDLE}
    auth:
      tokenSecretRef:
        name: openbao-token-secret
        key: token
