---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: qui
spec:
  launchUrl: https://torrents.${ROOT_DOMAIN}
  callbackUrls:
    - "https://torrents.${ROOT_DOMAIN}/api/auth/oidc/callback"
  secret:
    keys:
      clientID: QUI__OIDC_CLIENT_ID
      clientSecret: QUI__OIDC_CLIENT_SECRET
