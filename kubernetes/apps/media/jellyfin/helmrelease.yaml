---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  values:
    controllers:
      main:
        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.10@sha256:e7ae47ca41254acea24612da3b7516c413f54fe5eee43728355a8a2b75953a8c
            env:
              DOTNET_SYSTEM_IO_DISABLEFILELOCKING: "true"
              JELLYFIN_PublishedServerUrl: &lbIP 192.168.42.35
              SSL_CERT_DIR: /usr/local/share/ca-certificates
              TZ: Europe/Warsaw
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 16Gi
              claims:
                - name: gpu
        initContainers:
          01-set-oidc:
            image:
              repository: nixery.dev/shell/xmlstarlet
              tag: latest
            command:
              - sh
              - -c
              - |
                xmlstarlet ed \
                  --update "//OidConfigs/item[key/string='pocket-id']/value/PluginConfiguration/OidClientId" \
                  --value "$OAUTH_CLIENT_ID" \
                  --update "//OidConfigs/item[key/string='pocket-id']/value/PluginConfiguration/OidSecret" \
                  --value "$OAUTH_CLIENT_SECRET" \
                  /config/plugins/configurations/SSO-Auth.xml \
                  > /tmp/SSO-Auth.xml \
                  && mv /tmp/SSO-Auth.xml /config/plugins/configurations/SSO-Auth.xml
            envFrom:
              - secretRef:
                  name: jellyfin-oidc-credentials
            securityContext: *sc
            resources:
              requests:
                cpu: 5m
                memory: 10M
        statefulset:
          volumeClaimTemplates:
            - name: cache
              storageClass: ceph-block
              accessMode: ReadWriteOnce
              size: 50Gi
              advancedMounts:
                app:
                  - path: /cache
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      labels:
        egress.cilium.io/auth: "true"
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: jellyfin-gpu
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: *lbIP
        externalTrafficPolicy: Local
        ports:
          http:
            appProtocol: kubernetes.io/wss
            port: *port
    route:
      app:
        hostnames:
          - "jellyfin.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: jellyfin
                port: 8096
            filters:
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  set:
                    - name: Content-Security-Policy
                      value: >-
                        default-src 'self';
                        font-src 'self' https://fonts.gstatic.com;
                        img-src 'self' https://cdn.jsdelivr.net https://raw.githubusercontent.com
                        https://repo.jellyfin.org;
                        object-src 'none';
                        script-src 'self' 'unsafe-inline' blob: https://cdn.jsdelivr.net;
                        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
    persistence:
      config:
        existingClaim: jellyfin
      homelab-ca:
        type: secret
        name: homelab-root-ca.crt
        globalMounts:
          - path: /usr/local/share/ca-certificates/homelab.crt
            subPath: ec.crt
      tank:
        type: custom
        volumeSpec:
          csi:
            driver: nfs.csi.k8s.io
            volumeAttributes:
              server: nas.internal
              share: "/mnt/tank/media"
              mountOptions: "noac,nfsvers=4.1,nconnect=16,hard,noatime"
        globalMounts:
          - path: /data
            subPath: media
      tmp:
        type: emptyDir
