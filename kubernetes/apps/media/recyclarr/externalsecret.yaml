---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recyclarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: recyclarr-secret
    template:
      data:
        RADARR_API_KEY: "{{ .RADARR_API_KEY }}"
        SONARR_API_KEY: "{{ .SONARR_API_KEY }}"
  data:
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: kubernetes/media/radarr
        property: RADARR__AUTH__APIKEY
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: kubernetes/media/sonarr
        property: SONARR__AUTH__APIKEY
