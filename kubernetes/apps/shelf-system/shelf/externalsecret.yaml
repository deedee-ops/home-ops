---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shelf
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: shelf-secret
    template:
      data:
        ANON_KEY: "{{ .ANON_KEY }}"
        INVITE_TOKEN_SECRET: "{{ .INVITE_TOKEN_SECRET }}"
        JWT_SECRET: "{{ .JWT_SECRET }}"
        MAPTILER_TOKEN: "{{ .MAPTILER_TOKEN }}"
        SERVICE_ROLE_KEY: "{{ .SERVICE_ROLE_KEY }}"
        SESSION_SECRET: "{{ .SESSION_SECRET }}"
  dataFrom:
    - extract:
        key: kubernetes/shelf-system/shelf
