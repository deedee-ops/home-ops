---
# yaml-language-server: $schema=https://schemas.ajgon.casa/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shelf
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: shelf-secret
    template:
      data:
        # Shelf webapp
        SESSION_SECRET: "{{ .SESSION_SECRET }}"
        INVITE_TOKEN_SECRET: "{{ .INVITE_TOKEN_SECRET }}"
        # Shared Supabase JWT signing secret. ANON_KEY and SERVICE_ROLE_KEY
        # are long-lived JWTs signed with this exact secret (role=anon /
        # role=service_role). GoTrue + storage-api both verify against it.
        JWT_SECRET: "{{ .JWT_SECRET }}"
        ANON_KEY: "{{ .ANON_KEY }}"
        SERVICE_ROLE_KEY: "{{ .SERVICE_ROLE_KEY }}"
  dataFrom:
    - extract:
        key: kubernetes/shelf-system/shelf
