---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelf
spec:
  chartRef:
    kind: OCIRepository
    name: shelf
  interval: 1h
  values:
    controllers:
      webapp:
        annotations:
          glance/name: Shelf
          glance/url: https://shelf.${ROOT_DOMAIN}
        initContainers:
          01-db-migrate:
            image: &shelfImg
              repository: ghcr.io/shelf-nu/shelf.nu
              tag: latest@sha256:fc8004a357251dbd56c73c8eacc126abe38af3f6f1f7de34e39fb774c7ff7939
            command:
              - /bin/sh
              - -c
            args:
              - |
                export DATABASE_URL="postgres://$${PGUSER}:$${PGPASSWORD}@$${PGHOST}:$${PGPORT}/shelf"
                export DIRECT_URL="$${DATABASE_URL}"
                exec npx --yes prisma@6.19.3 migrate deploy \
                  --schema /src/packages/database/prisma/schema.prisma
            env:
              <<: &pgEnv
                PGHOST:
                  secretKeyRef:
                    name: shelf-db-app
                    key: host
                PGPORT:
                  secretKeyRef:
                    name: shelf-db-app
                    key: port
                PGUSER:
                  secretKeyRef:
                    name: shelf-db-app
                    key: username
                PGPASSWORD:
                  secretKeyRef:
                    name: shelf-db-app
                    key: password
              HOME: /tmp
              NPM_CONFIG_CACHE: /tmp/.npm
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          app:
            image: *shelfImg
            command:
              - /bin/sh
              - -c
            args:
              - |
                export DATABASE_URL="postgres://$${PGUSER}:$${PGPASSWORD}@$${PGHOST}:$${PGPORT}/shelf"
                export DIRECT_URL="$${DATABASE_URL}"
                exec /src/apps/webapp/docker-entrypoint.sh
            env:
              <<: *pgEnv
              PORT: &webPort 8080
              SERVER_URL: https://shelf.${ROOT_DOMAIN}
              SUPABASE_URL: &supabaseUrl https://shelf-supabase.${ROOT_DOMAIN}
              NODE_EXTRA_CA_CERTS: /certs/homelab.pem
              ENABLE_PREMIUM_FEATURES: "false"
              DISABLE_SSO: "false"
              DISABLE_SIGNUP: "true"
              MAPTILER_TOKEN: "unused"
              SMTP_HOST: "smtp-relay.network.svc.cluster.local"
              SMTP_FROM: "deedee@${ROOT_DOMAIN}"
              SMTP_USER: ""
              SMTP_PWD: ""
              SESSION_SECRET:
                secretKeyRef:
                  name: shelf-secret
                  key: SESSION_SECRET
              INVITE_TOKEN_SECRET:
                secretKeyRef:
                  name: shelf-secret
                  key: INVITE_TOKEN_SECRET
              SUPABASE_ANON_PUBLIC: &anonKey
                secretKeyRef:
                  name: shelf-secret
                  key: ANON_KEY
              SUPABASE_SERVICE_ROLE: &serviceKey
                secretKeyRef:
                  name: shelf-secret
                  key: SERVICE_ROLE_KEY
            probes:
              liveness: &webProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: *webPort
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
              readiness: *webProbe
            securityContext: *sc
            resources:
              requests:
                cpu: 25m
                memory: 384Mi
              limits:
                memory: 1Gi

      gotrue:
        containers:
          app:
            image:
              repository: ghcr.io/supabase/gotrue
              tag: v2.193.1@sha256:1399c3e86b23400d1858ac830a8aeb4ce55fd3e25a2b9205133e0b21b08ac8e5
            command:
              - /bin/sh
              - -c
            args:
              - |
                export GOTRUE_DB_DATABASE_URL="postgres://$${PGUSER}:$${PGPASSWORD}@$${PGHOST}:$${PGPORT}/shelf?search_path=auth"
                exec auth
            env:
              <<: *pgEnv
              GOTRUE_API_HOST: 0.0.0.0
              PORT: &authPort 9999
              # Must include /auth/v1 so GoTrue derives the external-provider
              # callback as https://shelf-supabase.../auth/v1/callback (the
              # routed + Pocket-ID-registered URL). external.go: redirect =
              # API_EXTERNAL_URL + "/callback".
              API_EXTERNAL_URL: https://shelf-supabase.${ROOT_DOMAIN}/auth/v1
              GOTRUE_SITE_URL: https://shelf.${ROOT_DOMAIN}
              GOTRUE_URI_ALLOW_LIST: "https://shelf.${ROOT_DOMAIN}/**"
              GOTRUE_DB_DRIVER: postgres
              GOTRUE_DB_NAMESPACE: auth
              GOTRUE_JWT_SECRET: &jwtSecret
                secretKeyRef:
                  name: shelf-secret
                  key: JWT_SECRET
              GOTRUE_JWT_AUD: authenticated
              GOTRUE_JWT_EXP: "3600"
              GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
              GOTRUE_JWT_ADMIN_ROLES: service_role
              GOTRUE_DISABLE_SIGNUP: "false"
              GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
              GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
              GOTRUE_MAILER_AUTOCONFIRM: "true"
              # Pocket-ID is wired as a discovery-based CUSTOM OIDC provider
              # (identifier "pocketid"), registered at runtime by the
              # register-oidc job — NOT the built-in keycloak provider, whose
              # hardcoded /protocol/openid-connect/* paths Pocket-ID doesn't
              # serve. Custom providers are DB-stored (enabled by default).
              # Trust the homelab CA for OIDC discovery + token/userinfo to
              # id.${ROOT_DOMAIN}.
              SSL_CERT_FILE: /certs/homelab.pem
            probes:
              liveness: &authProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *authPort
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
              readiness: *authProbe
            securityContext: *sc
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

      storage-api:
        containers:
          app:
            image:
              repository: ghcr.io/supabase/storage-api
              tag: v1.67.13@sha256:e15a385958ebd0ff0017ac523eaadfe46d94573e0ef0241713f84a857eed5027
            command:
              - /bin/sh
              - -c
            args:
              - |
                export DATABASE_URL="postgres://$${PGUSER}:$${PGPASSWORD}@$${PGHOST}:$${PGPORT}/shelf"
                exec node dist/start/server.js
            env:
              <<: *pgEnv
              SERVER_PORT: &storagePort 5000
              AUTH_JWT_SECRET: *jwtSecret
              PGRST_JWT_SECRET: *jwtSecret
              ANON_KEY: *anonKey
              SERVICE_KEY: *serviceKey
              DB_INSTALL_ROLES: "false"
              POSTGREST_URL: ""
              TENANT_ID: shelf
              REGION: home
              STORAGE_BACKEND: file
              STORAGE_S3_BUCKET: shelf
              FILE_STORAGE_BACKEND_PATH: /var/lib/storage
              FILE_SIZE_LIMIT: "52428800" # 50 MiB
              ENABLE_IMAGE_TRANSFORMATION: "false"
            probes:
              liveness: &storageProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: *storagePort
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
              readiness: *storageProbe
            securityContext: *sc
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

      # ---------------------------------------------------------------------
      # Registers Pocket-ID as a discovery-based custom OIDC provider in GoTrue
      # (POST/PUT /admin/custom-providers). Runs on each reconcile, idempotent
      # (upsert by identifier), so it also re-syncs the client secret if the
      # pocket-id operator rotates it. Waits for GoTrue to be up first.
      # ---------------------------------------------------------------------
      register-oidc:
        type: job
        job:
          backoffLimit: 10
          ttlSecondsAfterFinished: 3600
        containers:
          app:
            image:
              repository: docker.io/badouralix/curl-jq
              tag: latest
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu
                GT="http://shelf-gotrue.shelf-system.svc.cluster.local:9999"
                echo "waiting for gotrue..."
                until curl -fsS "$${GT}/health" >/dev/null 2>&1; do sleep 3; done
                BODY=$(printf '{"provider_type":"oidc","identifier":"custom:pocketid","name":"Pocket ID","issuer":"https://id.${ROOT_DOMAIN}","client_id":"%s","client_secret":"%s","scopes":["openid","profile","email"],"pkce_enabled":false,"enabled":true}' "$${OAUTH_CLIENT_ID}" "$${OAUTH_CLIENT_SECRET}")
                AUTH="Authorization: Bearer $${SERVICE_ROLE_KEY}"
                ID=$(curl -fsS -H "$${AUTH}" "$${GT}/admin/custom-providers?type=oidc" | jq -r '[.. | objects | select(.identifier?=="custom:pocketid")][0].id // empty')
                if [ -n "$${ID}" ]; then
                  METHOD=PUT; URL="$${GT}/admin/custom-providers/$${ID}"
                else
                  METHOD=POST; URL="$${GT}/admin/custom-providers"
                fi
                echo "$${METHOD} $${URL}"
                CODE=$(curl -sS -o /tmp/resp -w '%{http_code}' -X "$${METHOD}" -H "$${AUTH}" -H "Content-Type: application/json" -d "$${BODY}" "$${URL}")
                echo "HTTP $${CODE}"; cat /tmp/resp; echo
                case "$${CODE}" in 2*) echo "pocketid custom OIDC provider registered";; *) exit 1;; esac
            env:
              SERVICE_ROLE_KEY:
                secretKeyRef:
                  name: shelf-secret
                  key: SERVICE_ROLE_KEY
              OAUTH_CLIENT_ID:
                secretKeyRef:
                  name: shelf-oidc-credentials
                  key: OAUTH_CLIENT_ID
              OAUTH_CLIENT_SECRET:
                secretKeyRef:
                  name: shelf-oidc-credentials
                  key: OAUTH_CLIENT_SECRET
              HOME: /tmp
            securityContext: *sc
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      labels:
        egress.cilium.io/auth: "true"
        egress.cilium.io/smtp-relay: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      webapp:
        controller: webapp
        ports:
          http:
            port: *webPort
      gotrue:
        controller: gotrue
        ports:
          http:
            port: *authPort
      storage-api:
        controller: storage-api
        ports:
          http:
            port: *storagePort
    route:
      app:
        hostnames:
          - "shelf.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          # Repurpose Shelf's /sso-login as the OIDC entry point: redirect to
          # GoTrue's authorize endpoint (provider=keycloak -> Pocket-ID), which
          # round-trips back to /oauth/callback authenticated. Exact match takes
          # precedence over the /-prefix backend rule below.
          - matches:
              - path:
                  type: Exact
                  value: /sso-login
            filters:
              - type: RequestRedirect
                requestRedirect:
                  scheme: https
                  hostname: "shelf-supabase.${ROOT_DOMAIN}"
                  statusCode: 302
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: "/auth/v1/authorize?provider=custom:pocketid&scopes=openid&redirect_to=https://shelf.${ROOT_DOMAIN}/oauth/callback"
          - backendRefs:
              - name: shelf-webapp
                port: *webPort
      supabase:
        hostnames:
          - "shelf-supabase.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /auth/v1
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - name: shelf-gotrue
                port: *authPort
          - matches:
              - path:
                  type: PathPrefix
                  value: /storage/v1
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - name: shelf-storage-api
                port: *storagePort
    persistence:
      storage:
        existingClaim: shelf
        advancedMounts:
          storage-api:
            app:
              - path: /var/lib/storage
      homelab-root-ca:
        type: secret
        name: homelab-root-ca
        advancedMounts:
          webapp:
            app:
              - path: /certs/homelab.pem
                subPath: ec.crt
          gotrue:
            app:
              - path: /certs/homelab.pem
                subPath: ec.crt
      tmp:
        type: emptyDir
        advancedMounts:
          webapp:
            app: &tmpMount
              - path: /tmp
            01-db-migrate: *tmpMount
          gotrue:
            app: *tmpMount
          storage-api:
            app: *tmpMount
          register-oidc:
            app: *tmpMount
