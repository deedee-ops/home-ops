---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/app-template-hr.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelf
spec:
  chartRef:
    kind: OCIRepository
    name: shelf
  interval: 1h
  values:
    controllers:
      webapp:
        annotations:
          glance/name: Shelf
          glance/url: https://shelf.${ROOT_DOMAIN}
        initContainers:
          01-db-migrate:
            image: &shelfImg
              repository: ghcr.io/shelf-nu/shelf.nu
              tag: latest@sha256:fc8004a357251dbd56c73c8eacc126abe38af3f6f1f7de34e39fb774c7ff7939
            command:
              - /bin/sh
              - -c
            args:
              - |
                export DATABASE_URL="postgres://$${PGUSER}:$${PGPASSWORD}@$${PGHOST}:$${PGPORT}/shelf"
                export DIRECT_URL="$${DATABASE_URL}"
                exec npx --yes prisma@6.19.3 migrate deploy \
                  --schema /src/packages/database/prisma/schema.prisma
            env:
              <<: &pgEnv
                PGHOST:
                  secretKeyRef:
                    name: shelf-db-app
                    key: host
                PGPORT:
                  secretKeyRef:
                    name: shelf-db-app
                    key: port
                PGUSER:
                  secretKeyRef:
                    name: shelf-db-app
                    key: username
                PGPASSWORD:
                  secretKeyRef:
                    name: shelf-db-app
                    key: password
              HOME: /tmp
              NPM_CONFIG_CACHE: /tmp/.npm
            securityContext: &sc
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          app:
            image: *shelfImg
            command:
              - /bin/sh
              - -c
            args:
              - |
                export DATABASE_URL="postgres://$${PGUSER}:$${PGPASSWORD}@$${PGHOST}:$${PGPORT}/shelf"
                export DIRECT_URL="$${DATABASE_URL}"
                exec /src/apps/webapp/docker-entrypoint.sh
            env:
              <<: *pgEnv
              PORT: &webPort 8080
              SERVER_URL: https://shelf.${ROOT_DOMAIN}
              SUPABASE_URL: &supabaseUrl https://shelf-supabase.${ROOT_DOMAIN}
              NODE_EXTRA_CA_CERTS: /certs/homelab.pem
              ENABLE_PREMIUM_FEATURES: "false"
              DISABLE_SSO: "false"
              DISABLE_SIGNUP: "true"
              MAPTILER_TOKEN: "unused"
              SMTP_HOST: "smtp-relay.network.svc.cluster.local"
              SMTP_FROM: "deedee@${ROOT_DOMAIN}"
              SMTP_USER: ""
              SMTP_PWD: ""
              SESSION_SECRET:
                secretKeyRef:
                  name: shelf-secret
                  key: SESSION_SECRET
              INVITE_TOKEN_SECRET:
                secretKeyRef:
                  name: shelf-secret
                  key: INVITE_TOKEN_SECRET
              SUPABASE_ANON_PUBLIC: &anonKey
                secretKeyRef:
                  name: shelf-secret
                  key: ANON_KEY
              SUPABASE_SERVICE_ROLE: &serviceKey
                secretKeyRef:
                  name: shelf-secret
                  key: SERVICE_ROLE_KEY
            probes:
              liveness: &webProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: *webPort
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
              readiness: *webProbe
            securityContext: *sc
            resources:
              requests:
                cpu: 25m
                memory: 384Mi
              limits:
                memory: 1Gi

      gotrue:
        containers:
          app:
            image:
              repository: ghcr.io/supabase/gotrue
              tag: v2.193.1@sha256:1399c3e86b23400d1858ac830a8aeb4ce55fd3e25a2b9205133e0b21b08ac8e5
            command:
              - /bin/sh
              - -c
            args:
              - |
                export GOTRUE_DB_DATABASE_URL="postgres://$${PGUSER}:$${PGPASSWORD}@$${PGHOST}:$${PGPORT}/shelf?search_path=auth"
                exec auth
            env:
              <<: *pgEnv
              GOTRUE_API_HOST: 0.0.0.0
              PORT: &authPort 9999
              API_EXTERNAL_URL: *supabaseUrl
              GOTRUE_SITE_URL: https://shelf.${ROOT_DOMAIN}
              GOTRUE_URI_ALLOW_LIST: "https://shelf.${ROOT_DOMAIN}/**"
              GOTRUE_DB_DRIVER: postgres
              GOTRUE_DB_NAMESPACE: auth
              GOTRUE_JWT_SECRET: &jwtSecret
                secretKeyRef:
                  name: shelf-secret
                  key: JWT_SECRET
              # supabase-js sends an `apikey` header; GoTrue's default CORS
              # allow-list omits it (Kong normally handles it), so the browser
              # preflight to /auth/v1/user fails with no ACAO. Allow it here.
              GOTRUE_CORS_ALLOWED_HEADERS: "apikey,x-client-info,x-supabase-api-version"
              GOTRUE_JWT_AUD: authenticated
              GOTRUE_JWT_EXP: "3600"
              GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
              GOTRUE_JWT_ADMIN_ROLES: service_role
              GOTRUE_DISABLE_SIGNUP: "false"
              GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
              GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
              GOTRUE_MAILER_AUTOCONFIRM: "true"
              # Built-in keycloak provider, pointed at the oidc-shim (a Caddy
              # controller below) instead of Pocket-ID directly. The shim
              # translates GoTrue's hardcoded /protocol/openid-connect/* paths
              # to Pocket-ID's real /authorize + /api/oidc/{token,userinfo}.
              # (Pocket-ID can't be a GoTrue *custom* OIDC provider: GoTrue's
              # discovery fetch SSRF-blocks Pocket-ID's private LAN IP.)
              GOTRUE_EXTERNAL_KEYCLOAK_ENABLED: "true"
              GOTRUE_EXTERNAL_KEYCLOAK_URL: https://shelf-oidc.${ROOT_DOMAIN}
              GOTRUE_EXTERNAL_KEYCLOAK_REDIRECT_URI: https://shelf-supabase.${ROOT_DOMAIN}/auth/v1/callback
              GOTRUE_EXTERNAL_KEYCLOAK_CLIENT_ID:
                secretKeyRef:
                  name: shelf-oidc-credentials
                  key: OAUTH_CLIENT_ID
              GOTRUE_EXTERNAL_KEYCLOAK_SECRET:
                secretKeyRef:
                  name: shelf-oidc-credentials
                  key: OAUTH_CLIENT_SECRET
              # Trust the homelab CA to reach the shim host over TLS.
              SSL_CERT_FILE: /certs/homelab.pem
            probes:
              liveness: &authProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *authPort
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
              readiness: *authProbe
            securityContext: *sc
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

      storage-api:
        containers:
          app:
            image:
              repository: ghcr.io/supabase/storage-api
              tag: v1.67.13@sha256:e15a385958ebd0ff0017ac523eaadfe46d94573e0ef0241713f84a857eed5027
            command:
              - /bin/sh
              - -c
            args:
              - |
                export DATABASE_URL="postgres://$${PGUSER}:$${PGPASSWORD}@$${PGHOST}:$${PGPORT}/shelf"
                exec node dist/start/server.js
            env:
              <<: *pgEnv
              SERVER_PORT: &storagePort 5000
              AUTH_JWT_SECRET: *jwtSecret
              PGRST_JWT_SECRET: *jwtSecret
              ANON_KEY: *anonKey
              SERVICE_KEY: *serviceKey
              DB_INSTALL_ROLES: "false"
              POSTGREST_URL: ""
              TENANT_ID: shelf
              REGION: home
              STORAGE_BACKEND: file
              STORAGE_S3_BUCKET: shelf
              FILE_STORAGE_BACKEND_PATH: /var/lib/storage
              FILE_SIZE_LIMIT: "52428800" # 50 MiB
              ENABLE_IMAGE_TRANSFORMATION: "false"
            probes:
              liveness: &storageProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: *storagePort
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
              readiness: *storageProbe
            securityContext: *sc
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

      # ---------------------------------------------------------------------
      # OIDC path-translation shim (Caddy). GoTrue's keycloak provider hardcodes
      # /protocol/openid-connect/{auth,token,userinfo}; Pocket-ID serves
      # /authorize + /api/oidc/{token,userinfo}. GOTRUE_EXTERNAL_KEYCLOAK_URL
      # targets this shim, which 302s the browser authorize to Pocket-ID's
      # /authorize and reverse-proxies the server-side token/userinfo calls.
      # ---------------------------------------------------------------------
      oidc-shim:
        containers:
          app:
            image:
              repository: docker.io/library/caddy
              # renovate: datasource=docker depName=docker.io/library/caddy
              tag: 2.10.0-alpine
            command:
              - caddy
              - run
              - --config
              - /etc/caddy/Caddyfile
              - --adapter
              - caddyfile
            env:
              XDG_DATA_HOME: /tmp
              XDG_CONFIG_HOME: /tmp
            probes:
              liveness: &shimProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &shimPort 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 6
              readiness: *shimProbe
            # The official Caddy binary carries a cap_net_bind_service file
            # capability; under NoNewPrivs (allowPrivilegeEscalation: false)
            # + drop ALL the kernel refuses to exec it ("operation not
            # permitted"). Add back NET_BIND_SERVICE (the only cap restricted
            # PSA permits) so the fscap isn't treated as an escalation.
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_BIND_SERVICE
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      labels:
        egress.cilium.io/auth: "true"
        egress.cilium.io/smtp-relay: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      webapp:
        controller: webapp
        ports:
          http:
            port: *webPort
      gotrue:
        controller: gotrue
        ports:
          http:
            port: *authPort
      storage-api:
        controller: storage-api
        ports:
          http:
            port: *storagePort
      oidc-shim:
        controller: oidc-shim
        ports:
          http:
            port: *shimPort
    route:
      app:
        hostnames:
          - "shelf.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          # Repurpose Shelf's /sso-login as the OIDC entry point: redirect to
          # GoTrue's authorize endpoint (provider=keycloak -> Pocket-ID), which
          # round-trips back to /oauth/callback authenticated. Exact match takes
          # precedence over the /-prefix backend rule below.
          - matches:
              - path:
                  type: Exact
                  value: /sso-login
            filters:
              - type: RequestRedirect
                requestRedirect:
                  scheme: https
                  hostname: "shelf-supabase.${ROOT_DOMAIN}"
                  statusCode: 302
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: "/auth/v1/authorize?provider=keycloak&scopes=openid&redirect_to=https://shelf.${ROOT_DOMAIN}/oauth/callback"
          - backendRefs:
              - name: shelf-webapp
                port: *webPort
      # OIDC shim host: GoTrue's keycloak provider targets this; Caddy
      # translates the Keycloak paths to Pocket-ID's real endpoints.
      oidc:
        hostnames:
          - "shelf-oidc.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: shelf-oidc-shim
                port: *shimPort
      supabase:
        hostnames:
          - "shelf-supabase.${ROOT_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /auth/v1
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - name: shelf-gotrue
                port: *authPort
          - matches:
              - path:
                  type: PathPrefix
                  value: /storage/v1
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - name: shelf-storage-api
                port: *storagePort
    persistence:
      storage:
        existingClaim: shelf
        advancedMounts:
          storage-api:
            app:
              - path: /var/lib/storage
      caddyfile:
        type: configMap
        name: shelf-oidc-shim-configmap
        advancedMounts:
          oidc-shim:
            app:
              - subPath: Caddyfile
                path: /etc/caddy/Caddyfile
      homelab-root-ca:
        type: secret
        name: homelab-root-ca
        advancedMounts:
          webapp:
            app: &certMount
              - path: /certs/homelab.pem
                subPath: ec.crt
          gotrue:
            app: *certMount
          oidc-shim:
            app: *certMount
      tmp:
        type: emptyDir
        advancedMounts:
          webapp:
            app: &tmpMount
              - path: /tmp
            01-db-migrate: *tmpMount
          gotrue:
            app: *tmpMount
          storage-api:
            app: *tmpMount
          oidc-shim:
            app: *tmpMount
