---
# yaml-language-server: $schema=https://schemas.ajgon.casa/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: shelf
spec:
  name: shelf
  owner: app
  cluster:
    name: shelf-db
  extensions:
    - ensure: present
      name: pgcrypto
    - ensure: present
      name: uuid-ossp
    - ensure: present
      name: pg_trgm
