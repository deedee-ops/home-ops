---
# yaml-language-server: $schema=https://schemas.ajgon.casa/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dragonfly-operator-grafana-dashboard
spec:
  allowCrossNamespaceImport: true
  configMapRef:
    key: grafana-dashboard.json
    name: dashboard-dragonfly-operator-grafana-dashboard
  folder: database
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
