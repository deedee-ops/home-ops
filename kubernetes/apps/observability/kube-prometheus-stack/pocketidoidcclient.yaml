---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: alertmanager
spec:
  launchUrl: https://alertmanager.${ROOT_DOMAIN}
  callbackUrls:
    - "https://alertmanager.${ROOT_DOMAIN}/oauth2/callback"
  allowedUserGroups:
    - name: admins
      namespace: security
  secret:
    keys:
      clientID: client-id
      clientSecret: client-secret
---
# yaml-language-server: $schema=https://schemas.ajgon.casa/pocketid.internal/pocketidoidcclient_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: prometheus
spec:
  launchUrl: https://prometheus.${ROOT_DOMAIN}
  callbackUrls:
    - "https://prometheus.${ROOT_DOMAIN}/oauth2/callback"
  allowedUserGroups:
    - name: admins
      namespace: security
  secret:
    keys:
      clientID: client-id
      clientSecret: client-secret
