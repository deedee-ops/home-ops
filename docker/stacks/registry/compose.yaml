---
# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
services:
  registry:
    image: public.ecr.aws/docker/library/registry:3.0.0@sha256:1fc7de654f2ac1247f0b67e8a459e273b0993be7d2beda1f3f56fbf1001ed3e7
    container_name: registry
    user: "1000:1000"
    restart: unless-stopped
    env_file:
      - compose.env
      - .env
    networks:
      - caddy
    labels:
      caddy: "*.${ROOT_DOMAIN}"
      caddy.1_@registry: "host registry.${ROOT_DOMAIN}"
      caddy.1_handle: "@registry"
      caddy.1_handle.reverse_proxy: "{{upstreams 5000}}"
    # security
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    read_only: true

  registry-ui:
    image: joxit/docker-registry-ui:2.5.7
    container_name: registry-ui
    restart: unless-stopped
    ports:
      - 8080:80
    networks:
      - caddy
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_TITLE=Docker Registry UI
      - DELETE_IMAGES=true
      - SHOW_CONTENT_DIGEST=true
      - NGINX_PROXY_PASS_URL=http://registry:5000
      - SHOW_CATALOG_NB_TAGS=true
      - CATALOG_MIN_BRANCHES=1
      - CATALOG_MAX_BRANCHES=1
      - TAGLIST_PAGE_SIZE=100
      - REGISTRY_SECURED=false
      - CATALOG_ELEMENTS_LIMIT=1000

networks:
  caddy:
    external: true
