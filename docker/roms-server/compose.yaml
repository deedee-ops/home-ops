---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/docker-compose.json
services:
  roms-server:
    environment:
      ROMS_SERVER_URL: http://192.168.2.10:4444
      ROMS_PKGS_DIR_FILTER: "PS3,PS4"
    image: registry.ajgon.casa/tools/roms-server:latest
    container_name: roms-server
    restart: unless-stopped
    user: 1000:1000
    volumes:
      - /mnt/tank/retro/roms:/data:ro
      - /mnt/tank/retro/metadata:/config
    tmpfs:
      - /tmp:mode=755,uid=1000,gid=1000
    ports:
      - 4444:8080
    # security
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    read_only: true
