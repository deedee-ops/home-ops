---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/docker-compose.json
services:
  garage:
    environment:
      GARAGE_ADMIN_TOKEN: "${GARAGE_ADMIN_TOKEN}"
      GARAGE_METRICS_TOKEN: "${GARAGE_METRICS_TOKEN}"
      GARAGE_RPC_SECRET: "${GARAGE_RPC_SECRET}"
    image: dxflrs/garage:v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
    container_name: garage
    user: "1000:1000"
    restart: unless-stopped
    configs:
      - source: garage-toml
        target: /etc/garage.toml
    volumes:
      - "${DATA_S3_DIR}:/var/lib/garage"
    networks:
      - internal
    # security
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    # traefik
    labels:
      traefik.enable: "true"
      # S3
      traefik.http.services.s3.loadbalancer.server.port: "3900"
      traefik.http.routers.s3.entrypoints: https
      traefik.http.routers.s3.rule: Host(`s3.${ROOT_DOMAIN}`)
      traefik.http.routers.s3.service: s3
      traefik.http.routers.s3.tls: true
      traefik.http.routers.s3.tls.certresolver: openbao-ecdsa
      traefik.http.routers.s3.tls.domains[0].main: 's3.${ROOT_DOMAIN}'
  garage-ui:
    image: noooste/garage-ui:v0.9.0@sha256:47d55be31d4f1b003364339ca0ba99b5caa1d94767a67619ed41972d63e0879a
    container_name: garage-ui
    user: "1000:1000"
    restart: unless-stopped
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    environment:
      GARAGE_UI_AUTH_OIDC_CLIENT_ID: "${GARAGE_UI_AUTH_OIDC_CLIENT_ID}"
      GARAGE_UI_AUTH_OIDC_CLIENT_SECRET: "${GARAGE_UI_AUTH_OIDC_CLIENT_SECRET}"
      GARAGE_UI_AUTH_OIDC_ENABLED: "true"
      GARAGE_UI_AUTH_OIDC_ISSUER_URL: "https://id.${ROOT_DOMAIN}"
      GARAGE_UI_AUTH_OIDC_PROVIDER_NAME: "Pocket ID"
      GARAGE_UI_AUTH_OIDC_SCOPES: "openid,email,profile,groups"
      GARAGE_UI_AUTH_OIDC_ROLE_ATTRIBUTE_PATH: "groups"
      GARAGE_UI_AUTH_OIDC_ADMIN_ROLE: "admins"
      GARAGE_UI_GARAGE_ADMIN_ENDPOINT: "http://garage:3903"
      GARAGE_UI_GARAGE_ADMIN_TOKEN: "${API_ADMIN_KEY}"
      GARAGE_UI_GARAGE_ENDPOINT: "http://garage:3900"
      GARAGE_UI_GARAGE_REGION: "eu-central-1"
      GARAGE_UI_SERVER_PORT: "8080"
      GARAGE_UI_SERVER_ROOT_URL: "https://garage.${ROOT_DOMAIN}"
    networks:
      - internal
    # security
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    # traefik
    labels:
      traefik.enable: "true"
      # Dashboard
      traefik.http.services.garage.loadbalancer.server.port: "8080"
      traefik.http.routers.garage.entrypoints: https
      traefik.http.routers.garage.rule: Host(`garage.${ROOT_DOMAIN}`)
      traefik.http.routers.garage.service: garage
      traefik.http.routers.garage.tls: true
      traefik.http.routers.garage.tls.certresolver: openbao-ecdsa
      traefik.http.routers.garage.tls.domains[0].main: 'garage.${ROOT_DOMAIN}'

configs:
  garage-toml:
    file: ./config/garage.toml

networks:
  internal:
    name: internal
    external: true
