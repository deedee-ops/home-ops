---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/docker-compose.json
services:
  borgmatic:
    environment:
      BACKUP_CRON: "30 12 * * *"
      TZ: "Europe/Warsaw"

      BORGMATIC_HOMELAB_ENCRYPTION_PASSPHRASE: "${BORGMATIC_HOMELAB_ENCRYPTION_PASSPHRASE}"
      BORGMATIC_HOMELAB_HC_PING_URL: "${BORGMATIC_HOMELAB_HC_PING_URL}"
      BORGMATIC_HOMELAB_REPO_BORGBASE_EU: "${BORGMATIC_HOMELAB_REPO_BORGBASE_EU}"
      BORGMATIC_HOMELAB_REPO_BORGBASE_US: "${BORGMATIC_HOMELAB_REPO_BORGBASE_US}"
      BORGMATIC_NAS_ENCRYPTION_PASSPHRASE: "${BORGMATIC_NAS_ENCRYPTION_PASSPHRASE}"
      BORGMATIC_NAS_HC_PING_URL: "${BORGMATIC_NAS_HC_PING_URL}"
      BORGMATIC_NAS_REPO_BORGBASE_EU: "${BORGMATIC_NAS_REPO_BORGBASE_EU}"
      BORGMATIC_NAS_REPO_BORGBASE_US: "${BORGMATIC_NAS_REPO_BORGBASE_US}"
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.6@sha256:9078c4c726e587b36ee25927cd2d1ebe29ca075fbc6184877a05559aa0f7392e
    container_name: borgmatic
    restart: always
    configs:
      - source: homelab
        target: /etc/borgmatic.d/homelab.yaml
      - source: nas
        target: /etc/borgmatic.d/nas.yaml
    volumes:
      - /mnt/fast:/mnt/fast:ro
      - /mnt/tank:/mnt/tank:ro
      - ${DATA_DOCKER_DIR}/borgmatic/config:/config

configs:
  homelab:
    file: ./config/homelab.yaml
  nas:
    file: ./config/nas.yaml
