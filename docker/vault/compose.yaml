---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/docker-compose.json
services:
  vault:
    image: hashicorp/vault:2.0.2@sha256:3fd53308acccd9e4e83fde3e6c6cf5b15e0f7fac1ff7510780b8b23f5e4c3de7
    container_name: vault
    restart: unless-stopped
    command: server
    configs:
      - source: vault-config
        target: /vault/config/config.hcl
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - ${DATA_DOCKER_DIR}/vault/file:/vault/file
    networks:
      - internal
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      # https://github.com/hashicorp/vault/issues/31919
      SKIP_SETCAP: "true"
      SKIP_CHOWN: "true"
    # ports:
    #   - 8200:8200
    # security
    cap_add:
      - CAP_IPC_LOCK
    # traefik
    labels:
      traefik.enable: "true"
      traefik.http.services.vault.loadbalancer.server.port: "8200"
      traefik.http.routers.vault.entrypoints: https
      traefik.http.routers.vault.rule: Host(`vault.${ROOT_DOMAIN}`)
      traefik.http.routers.vault.service: vault
      traefik.http.routers.vault.tls: true
      traefik.http.routers.vault.tls.certresolver: vault-ecdsa
      traefik.http.routers.vault.tls.domains[0].main: "vault.${ROOT_DOMAIN}"
    post_start:
      - command: >-
          sh -c "
          while ! vault operator unseal '${UNSEAL_KEY}'; do
          sleep 1;
          done"

configs:
  vault-config:
    file: ./config/config.hcl

networks:
  internal:
    name: internal
    external: true
