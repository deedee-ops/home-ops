---
# yaml-language-server: $schema=https://schemas.ajgon.casa/other/docker-compose.json
services:
  traefik:
    environment:
      CF_DNS_API_TOKEN: "${CF_DNS_API_TOKEN}"
      GODEBUG: "tlsrsakex=1"
      TRAEFIK_OIDC_CLIENT_ID: "${TRAEFIK_OIDC_CLIENT_ID}"
      TRAEFIK_OIDC_CLIENT_SECRET: "${TRAEFIK_OIDC_CLIENT_SECRET}"
      TRAEFIK_OIDC_ENCRYPTION_SECRET: "${TRAEFIK_OIDC_ENCRYPTION_SECRET}"
      TZ: Europe/Warsaw
    image: public.ecr.aws/docker/library/traefik:v3.7.6@sha256:21a3d83696379bac6434bb32e1dde0aff0e84ef2abd053ed3db87d3f45e749b2
    container_name: traefik
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    configs:
      - source: traefik
        target: /etc/traefik/traefik.yml
      - source: extra-dashboard
        target: /config/extra/dashboard.yaml
      - source: extra-tls
        target: /config/extra/tls.yaml
      - source: extra-truenas
        target: /config/extra/truenas.yaml
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DOCKER_DIR}/traefik/certs:/certs
      - ${DATA_DOCKER_DIR}/traefik/plugins-storage:/plugins-storage
      - ${DATA_DOCKER_DIR}/openbao/file/cert.pem:/openbao-internal.pem
    networks:
      - default
      - internal
    # security
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    read_only: true
  traefik-to-unifi:
    environment:
      IGNORE_SSL_WARNINGS: "true"
      TRAEFIK_API_URL: "http://traefik:8080/api/"
      TRAEFIK_IP: "${TRAEFIK_IP}"
      UNIFI_API_KEY: "${UNIFI_API_KEY}"
      UNIFI_URL: "${UNIFI_URL}"
      UNIFI_USERNAME: "${UNIFI_USERNAME}"
    image: ghcr.io/thomaslomas/traefik-to-unifi:v1.3.0@sha256:0aeeeb8171da8268edec8d87d599f129aded778ba98eb5eac1eccc5f10bcbcec
    container_name: traefik-to-unifi
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # security
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    read_only: true

configs:
  traefik:
    file: ./config/traefik.yaml
  extra-dashboard:
    file: ./config/extra/dashboard.yaml
  extra-tls:
    file: ./config/extra/tls.yaml
  extra-truenas:
    file: ./config/extra/truenas.yaml

networks:
  internal:
    name: internal
    external: true
